# ============================================================================
# openagent-api - Docker Compose
# Maintainer: William McKeon
# The identity gateway for OpenAgent
# ============================================================================
#
# ROLE:
#   Single-service compose stack for openagent-api. Builds the image from
#   docker/api/Dockerfile, wires environment variables from .env, and
#   exposes the gateway on host port 8001 per the port convention:
#     8000 = openagent-frontend (user-facing)
#     8001 = openagent-api      (this service)
#     8002 = openagent-infra    (model layer, separate stack)
#     8003 = openagent-logger   (capture layer, separate stack)
#     8004 = openagent-memory   (RAG layer, separate stack — optional/opt-in)
#
# DEPLOYMENT TOPOLOGIES:
#   openagent-frontend, openagent-api, openagent-infra, openagent-logger, and
#   openagent-memory each live in their own repos with their own compose
#   files. openagent-api has up to three outbound boundaries: openagent-infra
#   (hot path, /chat relay), openagent-logger (fire-and-forget event
#   emission), and — when configured — openagent-memory (opt-in RAG
#   retrieve/ingest). Three topologies are supported, selected by what
#   OPENAGENT_INFRA_URL, LOGGER_URL, and (optionally) MEMORY_URL are set to in
#   .env:
#
#     1. Everything on the host (no Docker for any service):
#          OPENAGENT_INFRA_URL=http://localhost:8002
#          LOGGER_URL=http://localhost:8003
#          MEMORY_URL=http://localhost:8004            # optional
#
#     2. openagent-api in Docker, upstreams on host:
#          OPENAGENT_INFRA_URL=http://host.docker.internal:8002
#          LOGGER_URL=http://host.docker.internal:8003
#          MEMORY_URL=http://host.docker.internal:8004 # optional
#        (The extra_hosts directive below makes this work on Linux as well
#        as Docker Desktop. This is the default — the dev workflow has the
#        upstreams running on the host, reached via the host's port
#        mapping.)
#
#     3. openagent-api, openagent-infra, openagent-logger (and optionally
#        openagent-memory) all in Docker on a shared external network:
#          OPENAGENT_INFRA_URL=http://openagent-infra:8002
#          LOGGER_URL=http://openagent-logger:8003
#          MEMORY_URL=http://openagent-memory:8004      # optional
#        (Requires the operator to create the shared network and set the
#        networks: directive accordingly. See "SHARED NETWORK" below. The
#        network name is `openagent-network`, matching openagent-logger's
#        compose file out of the box.)
#
#   The default in .env.example is topology 2 (host.docker.internal) because
#   that is the most common dev setup — openagent-infra running on the host
#   as a thin FastAPI proxy in front of a BYOC provider, openagent-logger
#   running in its own Docker stack on the host, and openagent-api in a
#   container. openagent-memory, when enabled, follows the same pattern.
#
# SHARED NETWORK (topology 3):
#   To put openagent-api, openagent-infra, openagent-logger (and, when
#   enabled, openagent-memory) on the same Docker network, the operator must
#   create the network once:
#     docker network create openagent-network
#   Then uncomment the `networks:` block at the bottom of this file and the
#   `networks:` line in the service definition. All participating compose
#   stacks (openagent-api, openagent-infra, openagent-logger, and
#   openagent-memory if used) must reference the same external network for
#   service-name resolution to work. openagent-logger's compose file already
#   declares `openagent-network` as external, so no change is needed there.
#
# WHY SINGLE SERVICE?
#   openagent-api is one container. It does not own a database, a worker, or
#   anything else. Other services in the system live in their own repos with
#   their own compose files and connect to openagent-api (or are connected to
#   by it) over HTTP — they are not added here. openagent-logger remains in
#   its own compose stack and openagent-api reaches it via LOGGER_URL.
#   openagent-memory, when enabled, likewise lives in its own stack and is
#   reached via MEMORY_URL — it owns its OWN database (pgvector); openagent-api
#   stores nothing locally.
#
# REBUILD WHEN:
#   - src/backend/api.py changes        → docker-compose up -d --build
#   - src/client/*.py changes           → docker-compose up -d --build
#                                         (the single COPY src/client/
#                                         directive in the Dockerfile covers
#                                         client/infra.py, client/logger.py,
#                                         and client/memory.py)
#   - src/prompt/bio.txt changes        → docker-compose up -d --build
#   - requirements.txt changes          → docker-compose up -d --build
#   - docker/api/Dockerfile changes     → docker-compose up -d --build
#   - .env changes                      → docker-compose up -d (no rebuild needed)
# ============================================================================

# Compose file format version pinned to 3.8 — last revision of the v3 spec
# that supports modern features like extra_hosts: host-gateway and the
# healthcheck variants. v3.8 is what openagent-infra and openagent-frontend
# use per their respective repos.
# version: "3.8"

# ----------------------------------------------------------------------------
# SERVICES
# ----------------------------------------------------------------------------
services:

  openagent-api:
    # ------------------------------------------------------------------------
    # IMAGE / BUILD
    # ------------------------------------------------------------------------
    # Build context is the repo root so the Dockerfile's COPY directives
    # (which reference src/prompt/, src/client/, src/backend/,
    # requirements.txt) resolve against the repo layout. The src/client/ COPY
    # directive picks up all client modules (infra.py, logger.py, memory.py)
    # because it copies the entire directory — no per-module Dockerfile change.
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: openagent-api:1.0.0
    container_name: openagent-api

    # ------------------------------------------------------------------------
    # ENVIRONMENT
    # ------------------------------------------------------------------------
    # All secrets and tunables come from .env at the repo root. The file is
    # gitignored; .env.example documents the schema.
    #
    # Required variables (api.py refuses to start without these):
    #   OPENAGENT_API_KEY    — inbound auth secret (frontend → openagent-api)
    #   INFRA_API_KEY        — outbound auth secret (api → openagent-infra)
    #   OPENAGENT_INFRA_URL  — base URL of openagent-infra
    #   LOGGER_URL           — base URL of openagent-logger
    #   LOGGER_API_KEY       — outbound auth secret to openagent-logger
    #   LOGGER_HMAC_SECRET   — payload-signing secret for events
    #
    # Optional variables (api.py applies defaults):
    #   OPENAGENT_FRONTEND_URL          — extra CORS origin
    #   OPENAGENT_LOG_LEVEL             — DEBUG | INFO | WARNING | ERROR | CRITICAL
    #   OPENAGENT_UPSTREAM_CONNECT_TIMEOUT  — seconds, default 10.0
    #   OPENAGENT_UPSTREAM_READ_TIMEOUT     — seconds or "none", default unbounded
    #                                     (unbounded accommodates provider
    #                                     cold-start + high-effort generation)
    #   OPENAGENT_HEALTH_TIMEOUT        — seconds, default 5.0
    #   OPENAGENT_BIO_PATH              — override bio.txt path inside container
    #   OPENAGENT_LOGGER_QUEUE_MAX_SIZE — max pending events in LoggerClient
    #                                     queue before drop-oldest kicks in,
    #                                     default 1000.
    #
    # Optional openagent-memory variables (opt-in; memory is enabled only when
    # both MEMORY_URL and MEMORY_API_KEY are set — otherwise full history is
    # forwarded as before):
    #   MEMORY_URL                      — base URL of openagent-memory
    #   MEMORY_API_KEY                  — outbound auth secret to openagent-memory
    #                                     (transport-key only; no HMAC today)
    #   MEMORY_SESSION_ID               — scopes retrieve/ingest + sets the
    #                                     session_id on emitted logger events
    #   MEMORY_RECENT_N                 — recent turns kept verbatim, default 10
    #   MEMORY_TOP_K                    — retrieve cap, default = memory's own (5)
    #   MEMORY_RETRIEVE_TIMEOUT         — seconds, hot-path bound, default 5.0
    #
    # The compose file does not declare these inline — they live in .env and
    # are passed via env_file: as with the other secrets.
    env_file:
      - .env

    # ------------------------------------------------------------------------
    # PORTS
    # ------------------------------------------------------------------------
    # Host port 8001 → container port 8001. The container's uvicorn binds to
    # 0.0.0.0:8001 per the Dockerfile CMD, so the mapping is 1:1. Operators
    # behind a port collision can change the LEFT side only:
    #   ports:
    #     - "8011:8001"    # host 8011 → container 8001
    # openagent-frontend's .env then needs OPENAGENT_API_URL to match.
    ports:
      - "8001:8001"

    # ------------------------------------------------------------------------
    # EXTRA HOSTS
    # ------------------------------------------------------------------------
    # Makes host.docker.internal resolve to the host machine on Linux. Docker
    # Desktop (Mac/Windows) provides this automatically; Linux does not, so we
    # declare it explicitly for cross-platform parity. Required for topology 2
    # (openagent-api in Docker, upstreams on host) — the default topology.
    # openagent-api uses this single entry to reach ALL of its upstream
    # services on the host via:
    #   OPENAGENT_INFRA_URL=http://host.docker.internal:8002
    #   LOGGER_URL=http://host.docker.internal:8003
    #   MEMORY_URL=http://host.docker.internal:8004   (when memory is enabled)
    # One host-gateway entry covers every upstream port; no per-service entry
    # is needed.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ------------------------------------------------------------------------
    # RESTART POLICY
    # ------------------------------------------------------------------------
    # `unless-stopped` auto-restarts on crash, OOM, or daemon restart, but
    # respects explicit `docker-compose stop`. This is the default used by
    # openagent-infra and openagent-frontend per their READMEs.
    restart: unless-stopped

    # ------------------------------------------------------------------------
    # HEALTHCHECK
    # ------------------------------------------------------------------------
    # Inherited from the Dockerfile's HEALTHCHECK directive. We don't redefine
    # it here because doing so would override the Dockerfile's version and
    # create two sources of truth. The Dockerfile is the authoritative
    # healthcheck.

    # ------------------------------------------------------------------------
    # NETWORKS (topology 3 — uncomment to enable)
    # ------------------------------------------------------------------------
    # When openagent-api, openagent-infra, openagent-logger (and, when
    # enabled, openagent-memory) all run in Docker and need to reach each
    # other by service name
    # (OPENAGENT_INFRA_URL=http://openagent-infra:8002,
    #  LOGGER_URL=http://openagent-logger:8003,
    #  MEMORY_URL=http://openagent-memory:8004), uncomment both this block and
    # the top-level `networks:` block at the bottom of this file. The operator
    # must also create the network once on the host:
    #   docker network create openagent-network
    # All sibling compose stacks (openagent-infra, openagent-logger, and
    # openagent-memory if used) must reference the same external network.
    # openagent-logger's compose file already declares `openagent-network` as
    # external, so no change is needed there.
    #
    # networks:
    #   - openagent-network

    # ------------------------------------------------------------------------
    # LOGGING
    # ------------------------------------------------------------------------
    # Cap the json-file driver so a chatty service can't fill the host disk.
    # openagent-api logs are typically low-volume (one INFO line per request)
    # so 10 MB × 3 files = 30 MB max retained per container. Operators with a
    # central log shipper (Loki, Datadog, CloudWatch) can override this in a
    # compose override file.
    #
    # Note: openagent-api's stdout logs are separate from the events emitted
    # to openagent-logger. The Docker logs capped here contain operator-facing
    # INFO/WARNING/ERROR lines (one per /chat, plus lifespan startup/shutdown
    # messages). Structured event capture (request_received / upstream_call /
    # upstream_error / stream_complete / conversation_capture, plus
    # memory_retrieve_degraded and memory_ingest_error when memory is enabled)
    # lands in openagent-logger's Postgres tables, not in this Docker log
    # stream.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ----------------------------------------------------------------------------
# NETWORKS (topology 3 — uncomment to enable)
# ----------------------------------------------------------------------------
# This declares `openagent-network` as an external network created outside
# this compose stack. openagent-logger's compose file declares the same
# external network. openagent-infra's compose file (and openagent-memory's, if
# you run memory in Docker) should declare the same external network if you
# want all the services on the unified Docker network. The operator runs
# `docker network create openagent-network` once before bringing up any of
# the stacks.
#
# See the SHARED NETWORK section in the header for the full bring-up steps.
#
# networks:
#   openagent-network:
#     external: true

# ============================================================================
# END OF FILE
# ============================================================================